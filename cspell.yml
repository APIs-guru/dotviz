language: en-gb
useGitignore: true
validateDirectives: true
ignorePaths:
  # Excluded from spelling check
  - cspell.yml
  - test/graphviz
  - test/snapshots
  # FIXME
  - backend
dictionaries:
  - html
  - typescript

overrides:
  - filename: './test/*'
    words:
      - endquote
  - filename: '**/*.svg'
    dictionaries:
      - css
  - filename: './backend/Dockerfile'
    ignoreRegExpList:
      - '-l[a-z]*'
    dictionaries:
      - makefile
      - cpp-refined
    words:
      - KEEPALIVE
  - filename: './backend/*.c'
    dictionaries:
      - cpp-refined
    words:
      - errorf
      - gvplugin
      - AGWARN
      - Agraph
      - Agnode
      - Agedge
      - Agattr
      - Agdesc
      - agopen
      - agsafeset
      - agmemread
      - agstrdup
      - agstrfree
      - agclose
      - agsubg
      - agseterr
      - agseterrf
      - agreseterrors
words:
  - poll_oneoff # WASI
  # actual words missing in cSpell dictionaries :(
  - ellipsize

  - testonly
  - dotviz
  - Goncharov
  - Daines
  - Graphviz
  - Dagre
  - rankdir
  - headport
  - cmap
  - cmapx
  - xdot
  - twopi
  - circo
  - neato
  - sfdp
  - ccall
  - Agerr
  - AGPREV
  - autoinstall
  - tailport
  - CELLBORDER
  - iovs
  - fdstat
  - filestat
  - prestat
  - pwrite
  - nwritten
  - NOTSUP
  - NOENT
  - pread
  - BADF
  - NOSYS
