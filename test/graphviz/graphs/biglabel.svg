<g id="node3" class="node">
<title>struct3</title>
<polygon fill="none" stroke="black" points="91.54,-0.5 91.54,-1377.3 645.68,-1377.3 645.68,-0.5 91.54,-0.5"/>
<text xml:space="preserve" text-anchor="middle" x="115.87" y="-701.5" font-family="Times,serif" font-size="14.00">hello</text>
<text xml:space="preserve" text-anchor="middle" x="115.87" y="-684.7" font-family="Times,serif" font-size="14.00">world</text>
<text xml:space="preserve" text-anchor="middle" x="115.87" y="-667.9" font-family="Times,serif" font-size="14.00">and</text>
<polyline fill="none" stroke="black" points="140.2,-0.5 140.2,-1377.3"/>
<text xml:space="preserve" text-anchor="middle" x="195.63" y="-1143.7" font-family="Times,serif" font-size="14.00">Thats the reason</text>
<polyline fill="none" stroke="black" points="140.2,-918.5 251.07,-918.5"/>
<text xml:space="preserve" text-anchor="middle" x="195.63" y="-684.9" font-family="Times,serif" font-size="14.00">post&#45;menopausal</text>
<polyline fill="none" stroke="black" points="140.2,-459.7 251.07,-459.7"/>
<text xml:space="preserve" text-anchor="middle" x="195.63" y="-226.1" font-family="Times,serif" font-size="14.00">estrogen</text>
<polyline fill="none" stroke="black" points="251.07,-0.5 251.07,-1377.3"/>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1360.7" font-family="Times,serif" font-size="14.00">is</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1343.9" font-family="Times,serif" font-size="14.00">given together with another hormone called</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1327.1" font-family="Times,serif" font-size="14.00">progestin: The combination lowers the risk of</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1310.3" font-family="Times,serif" font-size="14.00">endometrial cancer.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1277.5" font-family="Times,serif" font-size="14.00">But the NTP advisers said putting all</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1260.7" font-family="Times,serif" font-size="14.00">estrogens on the federal list would help</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1243.9" font-family="Times,serif" font-size="14.00">women trying to balance the benefits and</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1227.1" font-family="Times,serif" font-size="14.00">risks when choosing hormone therapy.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1210.3" font-family="Times,serif" font-size="14.00">Physicians never discuss any of these risks</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1193.5" font-family="Times,serif" font-size="14.00">when they are prescribing hormone therapy.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1176.7" font-family="Times,serif" font-size="14.00">They only discuss benefits. Listing might</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1159.9" font-family="Times,serif" font-size="14.00">force it on the table, Michelle Medinsky, a</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1143.1" font-family="Times,serif" font-size="14.00">toxicologist from Durham, N.C., said before</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1126.3" font-family="Times,serif" font-size="14.00">the vote.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1093.5" font-family="Times,serif" font-size="14.00">The committee of scientists advises the NTP,</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1076.7" font-family="Times,serif" font-size="14.00">a branch of the National Institutes of Health</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1059.9" font-family="Times,serif" font-size="14.00">that every two years updates the federal list</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1043.1" font-family="Times,serif" font-size="14.00">of proven and suspected cancer&#45;causing</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-1026.3" font-family="Times,serif" font-size="14.00">substances.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-993.5" font-family="Times,serif" font-size="14.00">The NTP typically follows its advisers</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-976.7" font-family="Times,serif" font-size="14.00">recommendations, but an officially updated</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-959.9" font-family="Times,serif" font-size="14.00">carcinogen list isnt expected until 2002.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-927.1" font-family="Times,serif" font-size="14.00">Thursday, after a daylong debate, the panel</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-910.3" font-family="Times,serif" font-size="14.00">declined to add talc powder to the list,</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-893.5" font-family="Times,serif" font-size="14.00">saying there wasnt enough evidence linking</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-876.7" font-family="Times,serif" font-size="14.00">its use in feminine hygiene products to</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-859.9" font-family="Times,serif" font-size="14.00">ovarian cancer. The panel deadlocked over</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-843.1" font-family="Times,serif" font-size="14.00">whether to a second type of talc, fibrous</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-826.3" font-family="Times,serif" font-size="14.00">talc that some studies have linked to lung</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-809.5" font-family="Times,serif" font-size="14.00">cancer in talc miners.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-776.7" font-family="Times,serif" font-size="14.00">On Wednesday, the panel voted to add</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-759.9" font-family="Times,serif" font-size="14.00">ultraviolet radiation &#45;&#45; those</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-743.1" font-family="Times,serif" font-size="14.00">sunburn&#45;causing rays long known to cause skin</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-726.3" font-family="Times,serif" font-size="14.00">cancer &#45;&#45; to the official carcinogen list.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-693.5" font-family="Times,serif" font-size="14.00">The panel on Friday continued debating an</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-676.7" font-family="Times,serif" font-size="14.00">association between cancers of the nose and</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-659.9" font-family="Times,serif" font-size="14.00">sinuses with industrial exposure to wood</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-643.1" font-family="Times,serif" font-size="14.00">dust.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-610.3" font-family="Times,serif" font-size="14.00">Talc has long been controversial. When</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-593.5" font-family="Times,serif" font-size="14.00">studies first appeared suggesting it migrated</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-576.7" font-family="Times,serif" font-size="14.00">into the ovaries to cause tumors, many</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-559.9" font-family="Times,serif" font-size="14.00">feminine hygiene products replaced talc with</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-543.1" font-family="Times,serif" font-size="14.00">cornstarch.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-510.3" font-family="Times,serif" font-size="14.00">Panelist Medinsky said she had been prepared</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-493.5" font-family="Times,serif" font-size="14.00">to list talc powder as reasonably believed</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-476.7" font-family="Times,serif" font-size="14.00">to cause cancer. But after listening to</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-459.9" font-family="Times,serif" font-size="14.00">hours of industry attacks on the science,</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-443.1" font-family="Times,serif" font-size="14.00">the evidence has knocked me out of the</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-426.3" font-family="Times,serif" font-size="14.00">reasonably category into not list, she</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-409.5" font-family="Times,serif" font-size="14.00">said before the panel voted 7&#45;3 against</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-392.7" font-family="Times,serif" font-size="14.00">listing talc.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-359.9" font-family="Times,serif" font-size="14.00">Talc has long been controversial. When</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-343.1" font-family="Times,serif" font-size="14.00">studies first appeared suggesting it migrated</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-326.3" font-family="Times,serif" font-size="14.00">into the ovaries to cause tumors, many</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-309.5" font-family="Times,serif" font-size="14.00">feminine hygiene products replaced talc with</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-292.7" font-family="Times,serif" font-size="14.00">cornstarch.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-259.9" font-family="Times,serif" font-size="14.00">Panelist Medinsky said she had been prepared</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-243.1" font-family="Times,serif" font-size="14.00">to list talc powder as reasonably believed</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-226.3" font-family="Times,serif" font-size="14.00">to cause cancer. But after listening to</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-209.5" font-family="Times,serif" font-size="14.00">hours of industry attacks on the science,</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-192.7" font-family="Times,serif" font-size="14.00">the evidence has knocked me out of the</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-175.9" font-family="Times,serif" font-size="14.00">reasonably category into not list, she</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-159.1" font-family="Times,serif" font-size="14.00">said before the panel voted 7&#45;3 against</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-142.3" font-family="Times,serif" font-size="14.00">listing talc.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-109.5" font-family="Times,serif" font-size="14.00">Talc in one form or the other can be found in</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-92.7" font-family="Times,serif" font-size="14.00">many papers, paints, ceramics, food wrappers,</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-75.9" font-family="Times,serif" font-size="14.00">hard candy, chewing gum, cosmetics and pills.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-59.1" font-family="Times,serif" font-size="14.00">Most people are familiar with talc as a loose</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-42.3" font-family="Times,serif" font-size="14.00">powder used in cosmetics and as a drying</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-25.5" font-family="Times,serif" font-size="14.00">powder.</text>
<text xml:space="preserve" text-anchor="middle" x="391.66" y="-8.7" font-family="Times,serif" font-size="14.00">abde</text>
<polyline fill="none" stroke="black" points="532.25,-0.5 532.25,-1377.3"/>
